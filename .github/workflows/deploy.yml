name: AI Review + Deploy

on:
  push:
    branches:
      - main

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/ai-review.js

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: ai-review
    # Always deploy — even if review flagged issues
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TORCHLIT_GAMES }}
          channelId: live
          projectId: torchlit-games
